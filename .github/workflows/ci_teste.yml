name: 01 - Monitoramento Contínuo Web + Mobile

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0,40 0-22/2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ================================================================
  # JOB 1 — TESTES WEB (Cypress) — roda em paralelo com mobile
  # ================================================================
  cypress-web:
    name: 🌐 Testes Web Cypress
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🧪 Cypress Run - Testes E2E ODP/Giro/Wemobi/UTP
        uses: cypress-io/github-action@v7
        id: cypress
        continue-on-error: true
        with:
          command: npx cypress run --browser electron --spec 'cypress/e2e/00_smoke/**/*.cy.js'
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN1: ${{ secrets.LOGIN1 }}
          SENHA1: ${{ secrets.SENHA1 }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Debug - listar arquivos
        run: ls -R cypress/reports || true

      - name: 🌐 Deploy Relatório Web → GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports
          destination_dir: reports/${{ github.run_number }}/web
          keep_files: true
          force_orphan: false

      # Salva o resultado para o job de notificação usar
      - name: 💾 Salvar resultado Web
        if: always()
        run: echo "${{ steps.cypress.outcome }}" > /tmp/resultado_web.txt

  # ================================================================
  # JOB 2 — TESTES MOBILE (Robot Framework) — roda em paralelo
  # ================================================================
  robot-mobile:
    name: 📱 Testes Mobile Robot Framework
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 🤖 Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: 📱 Instalar emulador Android API 33
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "system-images;android-33;google_apis;x86_64" \
            "platforms;android-33"
          echo "no" | avdmanager create avd \
            --name "Pixel_6_API_33" \
            --abi "google_apis/x86_64" \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      - name: ⚡ Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo apt-get install -y libvirt-clients libvirt-daemon-system qemu-kvm
          sudo adduser $USER kvm || true

      - name: 🚀 Iniciar emulador Android
        run: |
          nohup $ANDROID_HOME/emulator/emulator \
            -avd Pixel_6_API_33 \
            -no-window \
            -no-audio \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -no-boot-anim \
            -memory 4096 \
            &> /tmp/emulator.log &
          timeout 300 adb wait-for-device
          timeout 300 bash -c '
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; do
              echo "Aguardando boot... $(date)"
              sleep 5
            done
          '
          echo "✅ Emulador pronto"
          adb devices

      - name: 🐍 Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📦 Instalar Appium e driver Android
        run: |
          npm install -g appium
          appium driver install uiautomator2
          nohup appium --log /tmp/appium.log &
          sleep 10
          echo "✅ Appium rodando"

      - name: 🧪 Rodar testes appGiro
        id: robot_giro
        continue-on-error: true
        run: |
          robot \
            --outputdir app/logs/giro \
            --output output.xml \
            --log log.html \
            --report report.html \
            --variable LOGIN:${{ secrets.LOGIN }} \
            --variable SENHA:${{ secrets.SENHA }} \
            app/appGiro/login.robot

      - name: 🧪 Rodar testes appWemobi
        id: robot_wemobi
        continue-on-error: true
        run: |
          robot \
            --outputdir app/logs/wemobi \
            --output output.xml \
            --log log.html \
            --report report.html \
            --variable LOGIN:${{ secrets.LOGIN }} \
            --variable SENHA:${{ secrets.SENHA }} \
            app/appWemobi/login.robot

      - name: 📊 Mesclar relatórios Robot Framework
        if: always()
        continue-on-error: true
        run: |
          mkdir -p app/logs/combined
          rebot \
            --outputdir app/logs/combined \
            --output output.xml \
            --log log.html \
            --report report.html \
            --name "Mobile - Giro e Wemobi" \
            app/logs/giro/output.xml \
            app/logs/wemobi/output.xml

      - name: 🌐 Deploy Relatório Mobile → GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/logs/combined
          destination_dir: reports/${{ github.run_number }}/mobile
          keep_files: true
          force_orphan: false

      - name: 💾 Salvar logs como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-logs-${{ github.run_number }}
          path: |
            app/logs/combined/log.html
            app/logs/combined/report.html
          retention-days: 30

      # Expõe resultados individuais para o job de notificação
      - name: 📤 Expor resultados Mobile
        if: always()
        id: mobile_status
        run: |
          echo "giro=${{ steps.robot_giro.outcome }}" >> $GITHUB_OUTPUT
          echo "wemobi=${{ steps.robot_wemobi.outcome }}" >> $GITHUB_OUTPUT
          if [ "${{ steps.robot_giro.outcome }}" == "success" ] && \
             [ "${{ steps.robot_wemobi.outcome }}" == "success" ]; then
            echo "resultado=success" >> $GITHUB_OUTPUT
          else
            echo "resultado=failure" >> $GITHUB_OUTPUT
          fi

  # ================================================================
  # JOB 3 — NOTIFICAÇÕES (aguarda Web + Mobile terminarem)
  # ================================================================
  notificacao:
    name: 📧 Enviar Notificação
    runs-on: ubuntu-latest
    needs: [cypress-web, robot-mobile] # aguarda os 2 jobs
    if: always()

    steps:
      - name: ✅ E-mail de SUCESSO — Web + Mobile
        if: |
          needs.cypress-web.result == 'success' &&
          needs.robot-mobile.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [ESTÁVEL] Web + Mobile - Monit. Cont."
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br
          from: "Monitoramento Contínuo"
          body: |
            ✅ Monitoramento Completo — Web + Mobile

            Todos os testes finalizaram com SUCESSO.

            🌐 WEB (Cypress):
            • ODP / Giro / Wemobi / UTP → ✅ Passou
            • Smoke Tests: Busca de Destinos, Datas, Passagens e Assentos

            📱 MOBILE (Robot Framework):
            • AppGiro   → ✅ Login + Busca de Passagens
            • AppWemobi → ✅ Login + Busca de Passagens

            📊 RELATÓRIOS:
            🔗 Web:    https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/web/index.html
            🔗 Mobile: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/mobile/report.html

            🔧 Detalhes técnicos:
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Este relatório foi gerado automaticamente pelo sistema de Qualidade de Software.

      - name: 🚨 E-mail de FALHA — Web ou Mobile
        if: |
          needs.cypress-web.result != 'success' ||
          needs.robot-mobile.result != 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 [ALERTA] Web + Mobile - Monit. Cont."
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br
          from: "Monitoramento Contínuo"
          body: |
            🚨 FALHA DETECTADA — Web + Mobile

            📊 STATUS GERAL:
            • 🌐 Web (Cypress)          → ${{ needs.cypress-web.result == 'success' && '✅ Passou' || '❌ Falhou' }}
            • 📱 Mobile (Robot)         → ${{ needs.robot-mobile.result == 'success' && '✅ Passou' || '❌ Falhou' }}

            📊 RELATÓRIOS COMPLETOS:
            🔗 Web:    https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/web/index.html
            🔗 Mobile: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/mobile/report.html

            💡 POSSÍVEIS CAUSAS — Web:
            1. Instabilidade na API de busca ou login.
            2. Alteração de seletores no front-end.
            3. Lentidão excessiva (Timeout).

            💡 POSSÍVEIS CAUSAS — Mobile:
            1. Emulador demorou demais para iniciar.
            2. UiAutomator2 crashou durante execução.
            3. Seletor desatualizado após atualização do app.

            🛠️ LOGS DO CI:
            🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Este alerta foi gerado automaticamente pelo sistema de Qualidade de Software.
