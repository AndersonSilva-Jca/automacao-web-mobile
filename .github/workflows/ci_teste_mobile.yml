name: Executar Testes Mobile

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    # Importante: macOS ou runners auto-hospedados são necessários para aceleração de hardware (KVM/Nested Virtualization) para rodar emuladores Android fluidos no GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Node.js (Necessário para o Appium)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Instalar Appium v2 (Versão Estável)
        run: |
          npm install -g appium@latest
          appium --version
      - name: Instalar Driver UiAutomator2 Compatível
        run: |
          appium driver install uiautomator2
        # O '&' faz o processo rodar em background para liberar o terminal para os próximos passos

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm
      - name: Executar Testes com Emulador Android integrado
        uses: reactivecircus/android-emulator-runner@v2
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN2: ${{ secrets.LOGIN2 }}
          SENHA2: ${{ secrets.SENHA2 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true

          script: |
            adb kill-server
            adb start-server
            echo "Aguardando inicialização do dispositivo..."
            adb wait-for-device
            echo "Iniciando servidor Appium em background..."
            appium --log appium.log --log-level info &
            MY_APPIUM_PID=$!
            echo "Aguardando o Appium responder na porta 4723..."
            for i in $(seq 1 30); do if curl -s http://127.0.0.1:4723/status > /dev/null; then echo "Appium pronto!"; break; fi; sleep 2; done
            # echo "Instalando o Clube Giro..."
            # adb install-multiple ./app/apks/clube_giro/*.apk
            echo "Instalando o Wemobi..."
            adb install-multiple ./app/apks/wemobi/*.apk
            echo "Iniciando a execução dos testes com o Robot Framework..."
            robot -T -d ./public app/appWemobi/login.robot || true
            echo "Finalizando o processo do Appium..."
            appium --log appium.log &
            MY_APPIUM_PID=$!
            echo "PID: $MY_APPIUM_PID"
            kill $MY_APPIUM_PID
      # 🌟 PASSO NOVO: Garante o upload dos relatórios mesmo se o teste falhar
      - name: Upload dos Relatórios do Robot Framework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-execucao-${{ github.run_id }}-${{ github.run_number }}
          path: ./public/
          retention-days: 30

      - name: Enviar E-mail de Sucesso
        if: success() # Só roda se todos os testes passarem
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [TESTE MOBILE] Sucesso na execução horária!"
          to: anderson.ssantos@jcatlm.com.br
          from: "GitHub Actions CI"
          body: |
            Olá! O teste automatizado mobile do Clube Giro foi executado com SUCESSO.
            🌐 O relatório atualizado já está online e pode ser visto aqui:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html
            Logs detalhados:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/log.html
      # 🚨 Alerta de Falha por E-mail
      - name: Enviar E-mail de Falha
        if: failure() # Só roda se o Robot Framework acusar alguma falha de tela ou elemento
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 [TESTE MOBILE] Falha detectada no fluxo do Clube Giro!"
          to: anderson.ssantos@jcatlm.com.br
          from: "GitHub Actions CI"
          body: |
            Atenção! O teste automatizado mobile do Clube Giro FALHOU ou quebrou durante a última execução.
            🔍 Analise o erro imediatamente através do link do relatório online:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html
            Passos detalhados e prints integrados:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/log.html
