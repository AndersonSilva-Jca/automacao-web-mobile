name: Executar Testes Mobile

on:
  schedule:
    - cron: "0 * * * *" # Executa de uma em uma hora
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

  # Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    # Importante: macOS ou runners auto-hospedados são necessários para aceleração de hardware (KVM/Nested Virtualization) para rodar emuladores Android fluidos no GitHub Actions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Node.js (Necessário para o Appium)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Appium v2 (Versão Estável)
        run: |
          npm install -g appium@latest
          appium --version

      - name: Instalar Driver UiAutomator2 Compatível
        run: |
          appium driver install uiautomator2
        # O '&' faz o processo rodar em background para liberar o terminal para os próximos passos

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm

      - name: Executar Testes com Emulador Android integrado
        uses: reactivecircus/android-emulator-runner@v2
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN2: ${{ secrets.LOGIN2 }}
          SENHA2: ${{ secrets.SENHA2 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-level: 26
          target: default
          arch: x86
          profile: Nexus 4
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true

          script: |

            # Garante limpeza total antes de começar
            adb kill-server
            adb start-server
            adb wait-for-device

            echo "Iniciando Appium com permissão de override..."
            # --session-override permite que a nova sessão force a morte da antiga
            appium --log appium.log --log-level info --session-override &

            # Captura o PID de forma mais segura
            MY_APPIUM_PID=$!
            echo "Appium rodando com PID: $MY_APPIUM_PID"

            # Aguarda o Appium ficar online
            for i in $(seq 1 30); do 
              if curl -s http://127.0.0.1:4723/status > /dev/null; then 
                echo "Appium pronto!"; break; 
              fi; 
              sleep 2; 
            done

            # Instalação dos apps
            adb install-multiple ./app/apks/clube_giro_apks/*.apk
            adb install-multiple ./app/apks/wemobi_apks/*.apk

            # Execução dos testes
            robot -T -d ./public app/appGiro/login.robot app/appWemobi/login.robot || true

            # Finalização segura
            if [ -n "$MY_APPIUM_PID" ]; then
              echo "Finalizando Appium PID: $MY_APPIUM_PID"
              kill -9 $MY_APPIUM_PID || true
            fi

      # 🌟 PASSO NOVO: Garante o upload dos relatórios mesmo se o teste falhar
      - name: Upload dos Relatórios do Robot Framework
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-execucao-${{ github.run_id }}-${{ github.run_number }}
          path: ./public/
          retention-days: 30

      - name: Enviar E-mail de Sucesso
        if: success() # Só roda se todos os testes passarem
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [TESTE MOBILE] Sucesso na execução horária!"
          to: anderson.ssantos@jcatlm.com.br
          from: "GitHub Actions CI"
          body: |
            Olá! O teste automatizado mobile do Clube Giro foi executado com SUCESSO.

            🌐 O relatório atualizado já está online e pode ser visto aqui:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html

            Logs detalhados:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/log.html

      # 🚨 Alerta de Falha por E-mail
      - name: Enviar E-mail de Falha
        if: failure() # Só roda se o Robot Framework acusar alguma falha de tela ou elemento
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 [TESTE MOBILE] Falha detectada no fluxo do Clube Giro!"
          to: anderson.ssantos@jcatlm.com.br
          from: "GitHub Actions CI"
          body: |
            Atenção! O teste automatizado mobile do Clube Giro FALHOU ou quebrou durante a última execução.

            🔍 Analise o erro imediatamente através do link do relatório online:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/report.html

            Passos detalhados e prints integrados:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/log.html
