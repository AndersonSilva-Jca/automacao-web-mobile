name: Testes Mobile Robot Framework

on:
  schedule:
    - cron: "0 * * * *" # roda a cada hora

  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Node.js (Necessário para o Appium)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Appium v2 (Versão Estável)
        run: |
          npm install -g appium@latest
          appium --version

      - name: Instalar Driver UiAutomator2 Compatível
        run: |
          appium driver install uiautomator2
        # O '&' faz o processo rodar em background para liberar o terminal para os próximos passos

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm

      - name: Executar Testes com Emulador Android integrado
        uses: reactivecircus/android-emulator-runner@v2
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN2: ${{ secrets.LOGIN2 }}
          SENHA2: ${{ secrets.SENHA2 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: test
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb devices

            echo "APKs Clube Giro"
            ls -la ./app/apks/clube_giro

            echo "APKs Wemobi"
            ls -la ./app/apks/wemobi

            adb install-multiple ./app/apks/clube_giro/*.apk

            adb install-multiple ./app/apks/wemobi/*.apk

            adb shell pm list packages | grep giro || true
            adb shell pm list packages | grep wemobi || true

            robot -T -d ./public app/appGiro/login.robot app/appWemobi/login.robot

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: reports
