name: Testes Mobile Robot Framework

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Appium 2
        run: |
          npm uninstall -g appium || true

          npm install -g appium@2.19.0

          appium driver install --source=npm appium-uiautomator2-driver@3.7.10

          appium --version

          appium driver list --installed

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm

      - name: Executar Testes Mobile
        uses: reactivecircus/android-emulator-runner@v2
        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN2: ${{ secrets.LOGIN2 }}
          SENHA2: ${{ secrets.SENHA2 }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: test

          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim

          disable-animations: true

          script: |
            echo "===== INICIANDO APPIUM ====="

            appium --log appium.log --log-level info --session-override > appium.log 2>&1 &

            sleep 20

            echo "===== STATUS APPIUM ====="

            curl http://127.0.0.1:4723/status || true

            echo "===== DEVICES ====="

            adb devices

            echo "===== APKS CLUBE GIRO ====="

            ls -la ./app/apks/clube_giro

            echo "===== APKS WEMOBI ====="

            ls -la ./app/apks/wemobi

            echo "===== INSTALANDO CLUBE GIRO ====="

            adb install-multiple ./app/apks/clube_giro/*.apk

            echo "===== INSTALANDO WEMOBI ====="

            adb install-multiple ./app/apks/wemobi/*.apk

            adb shell screencap -p /sdcard/inicial.png
            adb pull /sdcard/inicial.png .

            echo "===== PACOTES ====="

            adb shell pm list packages | grep giro || true
            adb shell pm list packages | grep wemobi || true

            echo "===== ARQUIVOS ROBOT ====="

            find . -name "*.robot"

            echo "===== EXECUTANDO TESTES ====="

            adb shell screenrecord /sdcard/teste.mp4 &

            robot -T -d ./public app/

            robot -T -d ./public app/appGiro/login.robot app/appWemobi/login.robot || true

            adb pull /sdcard/teste.mp4 .

      - name: Capturar Evidências
        if: always()
        run: |
          adb devices

          adb exec-out screencap -p > tela_final.png || true

          adb logcat -d > android.log || true

      - name: Exibir Log Appium
        if: always()
        run: |
          cat appium.log || true

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: |
            public
            appium.log
            tela_final.png
            android.log
            teste.mp4
