name: 01 - Monitoramento Contínuo Cypress E2E
on:
  # push:
  #   branches:
  #     - main
  schedule:
    # Roda nos minutos 0 and 40 das horas pares (0, 2, 4, 6...)
    # - cron: "30 0-22/2 * * *"
    # Roda no minuto 20 das horas ímpares (1, 3, 5, 7...)
    # - cron: "0 1-23/2 * * *"
    # - cron: "30 1-23/2 * * *"
    - cron: "00 * * * *"
    - cron: "40 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Cypress Run - Testes E2E ODH/ODP/Giro/Wemobi/UTP
        uses: cypress-io/github-action@v7
        id: cypress
        continue-on-error: true
        with:
          command: npx cypress run --browser electron --spec 'cypress/e2e/00_smoke/**/*.cy.js'
          # --spec "cypress/e2e/{05_link_conexao,06_cards_duvidas_frequentes}/**/*"

        env:
          LOGIN: ${{ secrets.LOGIN }}
          SENHA: ${{ secrets.SENHA }}
          LOGIN1: ${{ secrets.LOGIN1 }}
          SENHA1: ${{ secrets.SENHA1 }}
          LOGIN2: ${{ secrets.LOGIN2 }}
          SENHA2: ${{ secrets.SENHA2 }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GMAIL_MAIL: ${{ secrets.GMAIL_MAIL }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CYPRESS_INTERNAL_NPM_REGISTRY_DISABLE_SSL_VERIFICATION: "1" # Força o bypass no Cypress

      - name: Debug - listar arquivos
        run: ls -R cypress/reports || true

      - name: Deploy do Relatório para GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress/reports
          destination_dir: reports/${{ github.run_number }}/01_e2e
          keep_files: true
          force_orphan: false
          # 👇 Não espera o Pages terminar de publicar
          enable_jekyll: false
          commit_message: "ci: deploy report run ${{ github.run_number }}"
      # - name: Deploy do Relatório para GitHub Pages
      #   if: always()
      #   uses: peaceiris/actions-gh-pages@v3
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./cypress/reports
      #     destination_dir: reports/${{ github.run_number }}/01_e2e
      #     keep_files: true
      #     force_orphan: false

      # - name: Enviar E-mail de SUCESSO ✅
      #   if: steps.cypress.outcome == 'success'
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{ secrets.MAIL_USERNAME }}
      #     password: ${{ secrets.MAIL_PASSWORD }}
      #     subject: "✅ ODH/ODP/Giro/Wemobi/UTP - Monit. Cont."
      #     to: anderson.ssantos@jcatlm.com.br
      #     cc: fabiano.britto@externo-jcatlm.com.br
      #     from: "Monitoramento Contínuo"
      #     body: |
      #       Monitoramento Cypress - ODH/ODP/Giro/Wemobi/UTP

      #       O ciclo de monitoramento contínuo foi finalizado com sucesso.

      #       📂 RELATÓRIO DISPONÍVEL:

      #       🔗 PAINEL EXECUTIVO (HTML): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/01_e2e/index.html

      #       📂 ÁREAS VALIDADAS:
      #       • [00] Smoke Tests - Críticos (Busca de Destinos, Datas, Passagens e Assentos ) - (Não implementado: Cupom, Compra com Pix/Cartão de crédito/ Conta Giro , Remarcação, Cancelamento)

      #       Detalhes técnicos: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # - name: Enviar E-mail de FALHA 🚨
      #   if: steps.cypress.outcome == 'failure'
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     username: ${{ secrets.MAIL_USERNAME }}
      #     password: ${{ secrets.MAIL_PASSWORD }}
      #     subject: "🚨[ALERTA] ODH/ODP/Giro/Wemobi/UTP - Monit. Cont."
      #     to: anderson.ssantos@jcatlm.com.br
      #     cc: alfredo.junior@jcatlm.com.br,fabiano.britto@externo-jcatlm.com.br
      #     from: "Monitoramento Contínuo"
      #     body: |

      #       Monitoramento Cypress - ODH/ODP/Giro/Wemobi/UTP

      #       🚨 RELATÓRIO DE FALHA DETECTADA

      #       🔍 INVESTIGAÇÃO RÁPIDA

      #       📊 ACESSAR RELATÓRIO COMPLETO:
      #       https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/01_e2e/index.html

      #       💡 POSSÍVEIS CAUSAS:

      #       1. Deploy's.
      #       1. Instabilidade na API de busca ou login do site.
      #       2. Alteração de seletores (Placeholders/IDs/Classes) no front-end.
      #       3. Lentidão excessiva no carregamento (Timeout).

      #       🛠️ LOGS GERAIS:
      #       🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      #       Este alerta foi gerado automaticamente pelo sistema de Qualidade de Software.

      - name: Enviar E-mail de SUCESSO ✅
        if: steps.cypress.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [SUCESSO] Monitoramento Contínuo - ODH/ODP/Giro/Wemobi/UTP"
          to: anderson.ssantos@jcatlm.com.br
          # cc: fabiano.britto@externo-jcatlm.com.br
          from: "Monitoramento Contínuo"
          # Alterado para html_body para suportar formatação profissional
          html_body: |
            <div style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; padding: 20px; border-radius: 5px;">
              <h2 style="color: #2e7d32; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; margin-top: 0;">✅ Ciclo de Monitoramento Finalizado com Sucesso</h2>
              
              <p>Olá, Equipe,</p>
              <p>O ciclo de testes automatizados de monitoramento contínuo foi executado nas plataformas operacionais e <strong>todas as validações críticas passaram com sucesso</strong>.</p>
              
              <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
                <tr style="background-color: #f8f9fa;">
                  <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold; width: 30%;">Ambientes:</td>
                  <td style="padding: 10px; border: 1px solid #ddd;">ODH / ODP / Giro / Wemobi / UTP</td>
                </tr>
                <tr>
                  <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Escopo Validado:</td>
                  <td style="padding: 10px; border: 1px solid #ddd;"><strong>[00] Smoke Tests - Críticos</strong> (Busca de Destinos, Datas, Passagens e Seleção de Assentos).</td>
                </tr>
                <tr style="background-color: #f8f9fa;">
                  <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">Não Implementado:</td>
                  <td style="padding: 10px; border: 1px solid #ddd; color: #666; font-size: 13px;">Cupom, Compra com Pix/Cartão, Conta Giro, Remarcação e Cancelamento.</td>
                </tr>
              </table>

              <div style="background-color: #e8f5e9; border-left: 4px solid #2e7d32; padding: 15px; margin: 20px 0; border-radius: 4px;">
                <h4 style="margin: 0 0 5px 0; color: #1b5e20;">📊 Relatórios Disponíveis:</h4>
                <p style="margin: 5px 0 0 0;">
                  🔹 <a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/01_e2e/index.html" style="color: #1565c0; font-weight: bold; text-decoration: none;">Acessar Painel Executivo (HTML)</a><br>
                  🔹 <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color: #1565c0; text-decoration: none; font-size: 13px;">Ver Detalhes Técnicos (Logs do GitHub)</a>
                </p>
              </div>

              <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
              <p style="font-size: 12px; color: #999; margin: 0; text-align: center;">Este é um e-mail automático gerado pelo sistema de Qualidade de Software (QA).</p>
            </div>

      - name: Enviar E-mail de FALHA 🚨
        if: steps.cypress.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 [ALERTA] Falha Detectada no Monitoramento - ODH/ODP/Giro/Wemobi/UTP"
          to: anderson.ssantos@jcatlm.com.br
          # cc: alfredo.junior@jcatlm.com.br,fabiano.britto@externo-jcatlm.com.br
          from: "Monitoramento Contínuo "
          # Alterado para html_body para suportar formatação profissional
          html_body: |
            <div style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; padding: 20px; border-radius: 5px;">
              <h2 style="color: #c62828; border-bottom: 2px solid #c62828; padding-bottom: 10px; margin-top: 0;">🚨 Alerta: Falha no Monitoramento Contínuo</h2>
              
              <p>Olá, Equipe,</p>
              <p>Identificamos uma quebra no fluxo operacional durante a execução dos testes automatizados. O problema requer uma investigação para avaliar o impacto nos sites produtivos.</p>
              
              <div style="background-color: #ffebee; border-left: 4px solid #c62828; padding: 15px; margin: 20px 0; border-radius: 4px;">
                <h4 style="margin: 0 0 5px 0; color: #b71c1c;">📊 Ações Imediatas:</h4>
                <p style="margin: 5px 0 0 0;">
                  ⚠️ <strong><a href="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }}/01_e2e/index.html" style="color: #b71c1c; font-weight: bold; text-decoration: underline;">Clique aqui para abrir o Relatório de Evidências (HTML)</a></strong><br>
                  🛠️ <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color: #1565c0; text-decoration: none; font-size: 13px;">Analisar Logs Técnicos da Pipeline</a>
                </p>
              </div>

              <h3 style="color: #37474f; margin-top: 25px; border-bottom: 1px solid #eee; padding-bottom: 5px;">🔍 Diagnóstico Operacional (Possíveis Causas):</h3>
              <p style="font-size: 14px; margin-bottom: 10px;">Como o ambiente está operacional, a falha pode estar atrelada a um dos três pilares abaixo:</p>
              
              <ul style="padding-left: 20px; margin-top: 0;">
                <li style="margin-bottom: 10px;">
                  <strong>1. Deploy Recente / Infraestrutura:</strong>
                  <span style="color: #555;"><br>• Entrada de novas features em produção ou instabilidade momentânea no servidor/provedor de hospedagem.</span>
                </li>
                <li style="margin-bottom: 10px;">
                  <strong>2. Ajustes / Quebras no Front-end:</strong>
                  <span style="color: #555;"><br>• Mudanças de layout, alteração de seletores (IDs, Classes, Placeholders) ou alteração na árvore do DOM que impedem a interação do robô.</span>
                </li>
                <li style="margin-bottom: 10px;">
                  <strong>3. Instabilidades no Back-end / APIs:</strong>
                  <span style="color: #555;"><br>• Lentidão excessiva (Timeout) no retorno das requisições, indisponibilidade na API de busca de trechos/datas ou falha no serviço de autenticação (Login).</span>
                </li>
              </ul>

              <p style="font-size: 14px; background-color: #fff9c4; padding: 10px; border-radius: 4px; border: 1px solid #fbc02d;">
                💡 <strong>Nota do QA:</strong> O relatório HTML acima contém os screenshots e o vídeo exato do momento do erro para acelerar o processo de correção pela equipe de desenvolvimento.
              </p>

              <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
              <p style="font-size: 12px; color: #999; margin: 0; text-align: center;">Este é um alerta automático gerado pelo sistema de Qualidade de Software (QA).</p>
            </div>
